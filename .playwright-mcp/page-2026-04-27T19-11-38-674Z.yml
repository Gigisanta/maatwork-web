          - generic [ref=e607]: Sí. MaatWork puede complementar o reemplazar gradualmente tus herramientas actuales. Tienes exportación de datos en cualquier momento y en formatos abiertos. No te obligamos a abandonar tus sistemas y no hay vendor lock-in.
