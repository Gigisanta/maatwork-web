          - generic [ref=e577]: Solo necesitas un celular e internet. Funciona en cualquier navegador moderno (Chrome, Safari, Firefox, Edge) y es compatible con Android, iPhone, tabletas y computadoras. No requiere hardware específico ni instalación de app nativa.
        - generic [ref=e578]:
          - button "¿Cuánto tarda en estar funcionando?" [ref=e579] [cursor=pointer]:
            - generic [ref=e580]: ¿Cuánto tarda en estar funcionando?
            - img [ref=e582]
          - generic [ref=e583]: "El proceso completo de diagnóstico, prototipo y lanzamiento toma entre 5 y 10 días hábiles: Diagnóstico (1-2 días), Prototipo (3-7 días), Launch (1-2 días). El tiempo exacto depende de la complejidad de tu negocio y tu disponibilidad para revisiones."
        - generic [ref=e584]:
          - button "¿Para qué tipos de negocios funciona?" [ref=e585] [cursor=pointer]:
            - generic [ref=e586]: ¿Para qué tipos de negocios funciona?
            - img [ref=e588]
          - generic [ref=e589]: "MaatWork está diseñado para negocios de servicios que manejan agenda y cobros: Gimnasios, salones de belleza y barberías, academias (idiomas, danza, karate, etc.), centros de pilates y yoga, swimming pools y clubes, consultorios profesionales, y más. La personalización por industria es una de nuestras características principales."
        - generic [ref=e590]:
          - button "¿Qué pasa si no me gusta?" [ref=e591] [cursor=pointer]:
            - generic [ref=e592]: ¿Qué pasa si no me gusta?
            - img [ref=e594]
          - generic [ref=e595]: Ofrecemos garantía de satisfacción. Si dentro de los primeros 30 días no estás conforme, hacemos ajustes gratuitos según tu feedback. En casos excepcionales, evaluamos devoluciones. Tu satisfacción es nuestra prioridad.
